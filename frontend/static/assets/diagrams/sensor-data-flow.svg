  <!-- Arrows -->
  <path d="M200 160 L280 90" stroke="#666" stroke-width="3" fill="none"/>
  <path d="M200 160 L280 160" stroke="#666" stroke-width="3" fill="none"/>
  <path d="M200 160 L280 230" stroke="#666" stroke-width="3" fill="none"/>

  <path d="M400 90 L480 90" stroke="#666" stroke-width="3" fill="none"/>
  <path d="M400 160 L480 160" stroke="#666" stroke-width="3" fill="none"/>
  <path d="M400 230 L480 230" stroke="#666" stroke-width="3" fill="none"/>

  <path d="M630 90 L700 150" stroke="#666" stroke-width="3" fill="none"/>
  <path d="M630 160 L700 180" stroke="#666" stroke-width="3" fill="none"/>
  <path d="M630 230 L700 200" stroke="#666" stroke-width="3" fill="none"/>

